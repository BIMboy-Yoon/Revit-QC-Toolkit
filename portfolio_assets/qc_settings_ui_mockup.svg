<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Revit QC Settings UI Mockup</title>
  <desc id="desc">Portfolio-ready vector mockup of the Revit QC Toolkit settings interface.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#263645" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: SUIT, Pretendard, 'Malgun Gothic', 'Segoe UI', sans-serif; fill: #263645; }
      .section-title { font-size: 24px; font-weight: 700; }
      .label { font-size: 19px; font-weight: 700; }
      .body { font-size: 18px; }
      .hint { font-size: 15px; fill: #5F6F7D; }
      .card-title { font-size: 18px; font-weight: 650; }
      .status { font-size: 23px; font-weight: 750; fill: #1E7A3A; }
      .count { font-size: 34px; font-weight: 750; }
      .button-text { font-size: 17px; font-weight: 600; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#FFFFFF"/>
  <rect x="90" y="30" width="1420" height="930" rx="18" fill="#FFFFFF" stroke="#D6DDE3" stroke-width="2" filter="url(#shadow)"/>

  <path d="M108 30 H1492 A18 18 0 0 1 1510 48 V102 H90 V48 A18 18 0 0 1 108 30 Z" fill="#F4F6F8"/>
  <line x1="90" y1="102" x2="1510" y2="102" stroke="#D6DDE3" stroke-width="2"/>
  <rect x="122" y="57" width="13" height="13" rx="2" fill="#536777"/>
  <rect x="139" y="49" width="13" height="13" rx="2" fill="#536777"/>
  <rect x="139" y="66" width="13" height="13" rx="2" fill="#536777" opacity="0.72"/>
  <text x="174" y="72" font-size="22" font-weight="650">Revit QC Settings</text>
  <line x1="1394" y1="65" x2="1412" y2="65" stroke="#4A5B6A" stroke-width="2"/>
  <rect x="1432" y="56" width="17" height="17" fill="none" stroke="#4A5B6A" stroke-width="2"/>
  <path d="M1472 56 L1489 73 M1489 56 L1472 73" stroke="#4A5B6A" stroke-width="2"/>

  <text x="140" y="151" font-size="31" font-weight="750">Manage Excel reports and QC rules.</text>
  <!-- Excel Report -->
  <rect x="140" y="193" width="1320" height="262" rx="12" fill="#FFFFFF" stroke="#D6DDE3" stroke-width="2"/>
  <rect x="160" y="180" width="188" height="28" fill="#FFFFFF"/>
  <text x="170" y="205" class="section-title">Excel Report</text>

  <text x="180" y="248" class="label">Python:</text>
  <text x="280" y="248" class="body">python.exe</text>
  <rect x="1244" y="217" width="176" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="2"/>
  <text x="1332" y="245" text-anchor="middle" class="button-text">Set Python</text>

  <g>
    <rect x="180" y="278" width="393" height="96" rx="9" fill="#F4F6F8"/>
    <text x="376.5" y="314" text-anchor="middle" class="card-title">Python</text>
    <circle cx="337" cy="347" r="5" fill="#1E7A3A"/>
    <text x="352" y="354" class="status">Ready</text>
  </g>
  <g>
    <rect x="593" y="278" width="393" height="96" rx="9" fill="#F4F6F8"/>
    <text x="789.5" y="314" text-anchor="middle" class="card-title">Excel Library</text>
    <circle cx="750" cy="347" r="5" fill="#1E7A3A"/>
    <text x="765" y="354" class="status">Ready</text>
  </g>
  <g>
    <rect x="1006" y="278" width="414" height="96" rx="9" fill="#F4F6F8"/>
    <text x="1213" y="314" text-anchor="middle" class="card-title">Excel Report</text>
    <circle cx="1174" cy="347" r="5" fill="#1E7A3A"/>
    <text x="1189" y="354" class="status">Ready</text>
  </g>

  <rect x="1164" y="393" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="2"/>
  <text x="1224" y="419" text-anchor="middle" class="button-text">Test</text>
  <rect x="1300" y="393" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="2"/>
  <text x="1360" y="419" text-anchor="middle" class="button-text">Clear</text>

  <!-- QC Rules -->
  <rect x="140" y="484" width="1320" height="206" rx="12" fill="#FFFFFF" stroke="#D6DDE3" stroke-width="2"/>
  <rect x="160" y="471" width="142" height="28" fill="#FFFFFF"/>
  <text x="170" y="496" class="section-title">QC Rules</text>

  <text x="180" y="544" class="label">Rule Set:</text>
  <rect x="292" y="511" width="878" height="46" rx="7" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="2"/>
  <text x="314" y="541" class="body">Default QC</text>
  <path d="M1136 529 l9 9 9-9" fill="none" stroke="#4A5B6A" stroke-width="2"/>
  <rect x="1192" y="511" width="228" height="46" rx="8" fill="#536777"/>
  <text x="1306" y="541" text-anchor="middle" fill="#FFFFFF" class="button-text">Use This</text>

  <text x="180" y="583" class="hint">Choose the rule set before running QC.</text>
  <rect x="180" y="596" width="1240" height="44" rx="7" fill="#F4F6F8"/>
  <text x="198" y="624" class="body" fill="#5F6F7D">General Sheet, View, and Parameter QC preset.</text>

  <rect x="180" y="650" width="140" height="32" rx="7" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="2"/>
  <text x="250" y="672" text-anchor="middle" class="button-text">Copy</text>
  <rect x="336" y="650" width="214" height="32" rx="7" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="2"/>
  <text x="443" y="672" text-anchor="middle" class="button-text">Open Rule Folder</text>
  <rect x="566" y="650" width="140" height="32" rx="7" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="2"/>
  <text x="636" y="672" text-anchor="middle" class="button-text">Reload</text>

  <!-- Rule Count -->
  <rect x="140" y="719" width="1320" height="154" rx="12" fill="#FFFFFF" stroke="#D6DDE3" stroke-width="2"/>
  <rect x="160" y="706" width="160" height="28" fill="#FFFFFF"/>
  <text x="170" y="731" class="section-title">Rule Count</text>

  <g>
    <rect x="180" y="750" width="295" height="96" rx="9" fill="#F4F6F8"/>
    <text x="327.5" y="782" text-anchor="middle" class="card-title">Sheet Rules</text>
    <text x="327.5" y="829" text-anchor="middle" class="count">3</text>
  </g>
  <g>
    <rect x="492" y="750" width="295" height="96" rx="9" fill="#F4F6F8"/>
    <text x="639.5" y="782" text-anchor="middle" class="card-title">View Rules</text>
    <text x="639.5" y="829" text-anchor="middle" class="count">4</text>
  </g>
  <g>
    <rect x="804" y="750" width="295" height="96" rx="9" fill="#F4F6F8"/>
    <text x="951.5" y="782" text-anchor="middle" class="card-title">Parameter Rules</text>
    <text x="951.5" y="829" text-anchor="middle" class="count">4</text>
  </g>
  <g>
    <rect x="1116" y="750" width="304" height="96" rx="9" fill="#F4F6F8"/>
    <text x="1268" y="782" text-anchor="middle" class="card-title">Required Params</text>
    <text x="1268" y="829" text-anchor="middle" class="count">2</text>
  </g>

  <!-- Bottom Actions -->
  <rect x="960" y="895" width="140" height="40" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="2"/>
  <text x="1030" y="921" text-anchor="middle" class="button-text">Details</text>
  <rect x="1116" y="895" width="140" height="40" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="2"/>
  <text x="1186" y="921" text-anchor="middle" class="button-text">Open Log</text>
  <rect x="1272" y="895" width="148" height="40" rx="8" fill="#536777"/>
  <text x="1346" y="921" text-anchor="middle" fill="#FFFFFF" class="button-text">Close</text>
</svg>
